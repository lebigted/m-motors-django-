name: CI — M-Motors Django

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 . --max-line-length=120 --exclude=venv,migrations,staticfiles

      - name: Security scan (bandit)
        run: bandit -r . -x ./venv,./migrations --quiet --severity-level medium

      - name: Run tests with coverage
        run: pytest --cov=. --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=78
        env:
          DEBUG: 'True'
          SECRET_KEY: 'ci-test-secret-key'
